version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nanored}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nanored}
      POSTGRES_DB: ${POSTGRES_DB:-nanoredproxy}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nanored} -d ${POSTGRES_DB:-nanoredproxy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/live', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

  gateway:
    build: ./gateway
    env_file: .env
    ports:
      - "${SOCKS5_LISTEN_PORT:-1080}:1080"
    depends_on:
      - backend
      - redis
    volumes:
      - ./gateway:/app

  worker-availability:
    build: ./workers
    env_file: .env
    depends_on:
      - postgres
      - redis
    command: ["python", "-m", "workers.availability.worker"]
    volumes:
      - ./workers:/app/workers

  worker-speedtest:
    build: ./workers
    env_file: .env
    depends_on:
      - postgres
      - redis
    command: ["python", "-m", "workers.speedtest.worker"]
    volumes:
      - ./workers:/app/workers

  worker-geo:
    build: ./workers
    env_file: .env
    depends_on:
      - postgres
      - redis
    command: ["python", "-m", "workers.geo.worker"]
    volumes:
      - ./workers:/app/workers

  worker-aggregate:
    build: ./workers
    env_file: .env
    depends_on:
      - postgres
      - redis
    command: ["python", "-m", "workers.aggregate.worker"]
    volumes:
      - ./workers:/app/workers

  worker-reconcile:
    build: ./workers
    env_file: .env
    depends_on:
      - postgres
      - redis
    command: ["python", "-m", "workers.reconcile.worker"]
    volumes:
      - ./workers:/app/workers

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  postgres_data:
