services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nanored}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nanored}
      POSTGRES_DB: ${POSTGRES_DB:-nanoredproxy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nanored} -d ${POSTGRES_DB:-nanoredproxy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://backend:8000/api/v1/health/live', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

  gateway:
    build: ./gateway
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
      - redis
    ports:
      - "${SOCKS5_LISTEN_PORT:-1080}:1080"

  worker-orchestrator:
    build: ./workers
    restart: unless-stopped
    env_file: .env
    cap_add:
      - NET_RAW
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://backend:8000/api/v1/health/live', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
    command: ["python", "-m", "workers.orchestrator.main"]

  frontend:
    build: ./frontend
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
